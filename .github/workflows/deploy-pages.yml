# Deploys the authoring workbench (app/) to GitHub Pages.
name: Deploy authoring app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual runs from the Actions tab or `gh workflow run`

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      # Only this repo is checked out — the default GITHUB_TOKEN is scoped to it.
      # Pages builds from the COMMITTED app/public/components/<id>/ dialect copies
      # and app/public/lang/en.yml. Keep those current by running
      # `node itb-cli/src/sync-dialects.mjs <plugin dirs>` locally and committing
      # before you push (the app never reads the plugin repos at build time).
      #
      # (An earlier version cross-checked-out itb-cli / the plugin repos to
      # re-sync dialects in CI. That needs a token with access to those repos —
      # the default GITHUB_TOKEN only sees this one — and 404s otherwise. Removed
      # to keep the deploy self-contained. To restore it, check out the sibling
      # repos with `token: ${{ secrets.SYNC_PAT }}` and run sync-dialects here.)
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + vite build)
        run: npm run build
        env:
          # vite.config.ts: base = process.env.VITE_BASE_PATH || '/test-workbench/'
          # Project pages are served at https://<org>.github.io/itb-plugin-authoring/
          VITE_BASE_PATH: /itb-plugin-authoring/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
