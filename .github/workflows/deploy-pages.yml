# Deploys the authoring workbench (app/) to GitHub Pages.
name: Deploy authoring app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual runs from the Actions tab or `gh workflow run`

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + vite build)
        run: npm run build-only
        env:
          # vite.config.ts: base = process.env.VITE_BASE_PATH || '/test-workbench/'
          # Project pages are served at https://<org>.github.io/itb-plugin-authoring/
          VITE_BASE_PATH: /itb-plugin-authoring/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
